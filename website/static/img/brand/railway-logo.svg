<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100" height="80">
  <title>Railway Logo</title>
  <desc>Stylized railway track viewed from above — two parallel rails with four sleepers between them. SovereignSky green-to-teal gradient.</desc>
  <defs>
    <linearGradient id="railway-rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a8f5e"/>
      <stop offset="100%" style="stop-color:#25c2a0"/>
    </linearGradient>
  </defs>

  <!-- Sleepers (ties), drawn under the rails -->
  <rect x="18" y="22" width="6" height="36" rx="2" fill="#3a8f5e" fill-opacity="0.55"/>
  <rect x="36" y="22" width="6" height="36" rx="2" fill="#3a8f5e" fill-opacity="0.55"/>
  <rect x="54" y="22" width="6" height="36" rx="2" fill="#3a8f5e" fill-opacity="0.55"/>
  <rect x="72" y="22" width="6" height="36" rx="2" fill="#3a8f5e" fill-opacity="0.55"/>

  <!-- Rails (on top) -->
  <rect x="6" y="28" width="88" height="5" rx="2.5" fill="url(#railway-rail)"/>
  <rect x="6" y="47" width="88" height="5" rx="2.5" fill="url(#railway-rail)"/>
</svg>
